memory_limit = 2G
max_execution_time = 1800
zlib.output_compression = Off
realpath_cache_size = 10M
realpath_cache_ttl = 7200
upload_max_filesize = 64M
post_max_size = 64M
date.timezone = America/Mexico_City

; revalidate_freq=0 (default de Magento) hace stat() en ~50k archivos por request.
; Sobre bind mount NTFS + Docker Desktop eso puede costar decenas de segundos.
; validate_timestamps=0 evita esos stat() por completo; tras cambiar PHP reinicia
; php-fpm: docker compose restart php-fpm
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Xdebug queda deshabilitado por defecto (impacta mucho el rendimiento de
; Magento). Si lo necesitas, instala la extensión en el Dockerfile y
; descomenta/ajusta esto:
; xdebug.mode = debug
; xdebug.client_host = host.docker.internal
; xdebug.start_with_request = trigger
