services:
  nginx:
    image: nginx:1.26-alpine
    container_name: ${PROJECT_NAME}_nginx
    depends_on:
      - php-fpm
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./src:/var/www/html:cached
      # Carpetas de alto I/O en volumen Linux (evita el bind mount NTFS de Windows)
      - magento_var:/var/www/html/var
      - magento_generated:/var/www/html/generated
      - magento_pub_static:/var/www/html/pub/static
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - magento

  php-fpm:
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION}
        CORPORATE_CA_CERT: ${CORPORATE_CA_CERT}
    container_name: ${PROJECT_NAME}_php
    depends_on:
      - db
      - opensearch
      - redis
    volumes:
      - ./src:/var/www/html:cached
      - magento_var:/var/www/html/var
      - magento_generated:/var/www/html/generated
      - magento_pub_static:/var/www/html/pub/static
      - magento_vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-magento.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      # cache de composer compartido entre proyectos (evita redescargar todo cada vez)
      - composer_cache:/var/www/.composer/cache
    environment:
      PHP_MEMORY_LIMIT: 2G
    networks:
      - magento

  # Ejecuta bin/magento cron:run cada minuto. Sin esto, los indexers en modo
  # "Update by Schedule" (el default recomendado) nunca se procesan solos:
  # las tablas *_cl (changelog) se llenan pero nadie las consume.
  cron:
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION}
        CORPORATE_CA_CERT: ${CORPORATE_CA_CERT}
    container_name: ${PROJECT_NAME}_cron
    depends_on:
      - db
      - opensearch
      - redis
    volumes:
      - ./src:/var/www/html:cached
      - magento_var:/var/www/html/var
      - magento_generated:/var/www/html/generated
      - magento_pub_static:/var/www/html/pub/static
      - magento_vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-magento.ini:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        while true; do
          php /var/www/html/bin/magento cron:run 2>&1
          sleep 60
        done
    networks:
      - magento

  db:
    image: mariadb:11.4
    container_name: ${PROJECT_NAME}_db
    command: >
      --max_allowed_packet=64M
      --innodb_buffer_pool_size=1G
      --slow_query_log=1
      --slow_query_log_file=/var/lib/mysql/slow.log
      --long_query_time=1
      --log_slow_verbosity=query_plan,explain
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - magento

  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: ${PROJECT_NAME}_opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${OPENSEARCH_PORT}:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - magento

  redis:
    image: redis:7.2-alpine
    container_name: ${PROJECT_NAME}_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - magento

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${PROJECT_NAME}_mailpit
    ports:
      - "${MAILPIT_UI_PORT}:8025"
      - "${MAILPIT_SMTP_PORT}:1025"
    networks:
      - magento

networks:
  magento:
    driver: bridge

volumes:
  db_data:
  opensearch_data:
  redis_data:
  composer_cache:
  magento_var:
  magento_generated:
  magento_pub_static:
  magento_vendor:
